# Nombre del microservicio (IMPORTANTE para Eureka)
spring.application.name=ms-stock
server.port=8083

# MySQL en XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/db_stock?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ====================================
# EUREKA CLIENT - Descubrimiento
# ====================================
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.preferIpAddress=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# ====================================
# CONFIGURACI�N DE ms-catalogo
# ====================================
# Con Eureka: usamos el nombre del servicio (ms-catalogo) en lugar de URL hardcodeada
app.catalogo.url=http://ms-catalogo
app.catalogo.timeout=5
app.catalogo.endpoint.producto-por-id=/catalogo/productos/{id}

# ====================================
# Logging
# ====================================
logging.level.root=INFO
logging.level.cl.dsy1103.ms_stock=DEBUG
logging.level.org.springframework.cloud=DEBUG

